<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>羽毛球单打比赛系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f0c;
      --bg-card: #121a15;
      --bg-hover: #1a2420;
      --accent: #00e080;
      --gold: #f0c020;
      --red: #f05050;
      --text: #e0efe8;
      --muted: #507068;
      --border: #1c2e26;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .font-display { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.03em; }
    
    .bg-main {
      background: 
        radial-gradient(ellipse 120% 60% at 50% -30%, rgba(0,224,128,0.08), transparent),
        radial-gradient(circle at 80% 90%, rgba(0,224,128,0.04), transparent),
        var(--bg);
    }
    
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: border-color 0.2s, background 0.2s;
    }
    .card:hover { border-color: rgba(0,224,128,0.2); }
    
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #00c070);
      color: #0a0f0c;
      box-shadow: 0 4px 16px rgba(0,224,128,0.2);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,224,128,0.3); }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger {
      background: rgba(240,80,80,0.1);
      border: 1px solid rgba(240,80,80,0.3);
      color: var(--red);
    }
    .btn-danger:hover { background: rgba(240,80,80,0.2); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    
    .input {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      color: var(--text);
      width: 100%;
      font-size: 14px;
      transition: all 0.2s;
    }
    .input:focus { outline: none; border-color: var(--accent); }
    
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,224,128,0.08);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      animation: tagPop 0.25s ease;
    }
    .tag:hover { border-color: var(--accent); }
    @keyframes tagPop { from { opacity:0; transform:scale(0.9); } }
    
    .tab-bar {
      display: flex;
      gap: 3px;
      background: rgba(0,0,0,0.25);
      padding: 3px;
      border-radius: 10px;
    }
    .tab {
      flex: 1;
      padding: 9px 8px;
      border-radius: 7px;
      font-weight: 500;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }
    .tab.active { background: var(--accent); color: var(--bg); }
    .tab:not(.active):hover { color: var(--text); }
    
    .match-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      min-width: 140px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .match-box:hover { border-color: rgba(0,224,128,0.4); transform: translateY(-1px); }
    .match-box.playing { border-color: var(--accent); box-shadow: 0 0 16px rgba(0,224,128,0.12); }
    .match-box.done { opacity: 0.75; }
    
    .p-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 9px;
      background: rgba(0,0,0,0.25);
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 5px;
    }
    .p-row:last-child { margin-bottom: 0; }
    .p-row.win { background: rgba(0,224,128,0.1); border: 1px solid var(--accent); }
    .p-row.bye { justify-content: center; color: var(--muted); font-size: 11px; }
    
    .score-num {
      background: rgba(255,255,255,0.1);
      padding: 2px 7px;
      border-radius: 5px;
      font-weight: 700;
      font-size: 11px;
      min-width: 22px;
      text-align: center;
    }
    .score-num.win { background: var(--accent); color: var(--bg); }
    
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.wait { background: var(--muted); }
    .dot.play { background: var(--accent); animation: blink 1s infinite; }
    .dot.done { background: var(--gold); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
      padding: 16px;
    }
    .modal-bg.show { opacity: 1; visibility: visible; }
    .modal-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      width: 100%;
      max-width: 360px;
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .modal-bg.show .modal-box { transform: scale(1); }
    
    .score-input {
      width: 56px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      background: rgba(0,0,0,0.4);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      color: var(--text);
    }
    .score-input:focus { outline: none; border-color: var(--accent); }
    
    .champion-card {
      background: linear-gradient(145deg, rgba(240,192,32,0.12), rgba(240,192,32,0.02));
      border: 2px solid var(--gold);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      position: relative;
    }
    
    .hist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      transition: background 0.15s;
    }
    .hist-item:hover { background: rgba(0,0,0,0.3); }
    
    .tourney-item {
      padding: 16px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .tourney-item:hover { background: rgba(0,0,0,0.3); border-color: var(--border); }
    
    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .stat-cell {
      background: var(--bg-card);
      padding: 12px 8px;
      text-align: center;
    }
    
    .vs-line {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
    }
    
    .confetti {
      position: fixed;
      top: -10px;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
    }
    
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body class="bg-main">

<header class="sticky top-0 z-50 border-b border-[var(--border)] bg-[var(--bg)]/95 backdrop-blur-md">
  <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-[var(--accent)] to-emerald-600 flex items-center justify-center shadow-lg">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0a0f0c" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
      </div>
      <div>
        <h1 class="font-display text-lg tracking-wide">BADMINTON</h1>
        <p class="text-[10px] text-[var(--muted)] -mt-0.5">单打锦标赛系统</p>
      </div>
    </div>
    <button id="backBtn" class="btn btn-ghost btn-sm hidden" onclick="goBack()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      返回
    </button>
  </div>
</header>

<main class="max-w-2xl mx-auto px-4 py-4">
  <!-- 比赛列表页 -->
  <section id="page-list">
    <div class="card p-5 mb-4">
      <h2 class="font-display text-xl text-[var(--accent)] mb-4">新建比赛</h2>
      <div class="flex gap-2 mb-3">
        <input type="text" id="newTitle" class="input" placeholder="输入比赛名称，如：2024年春季赛">
      </div>
      <button onclick="createTournament()" class="btn btn-primary w-full">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        创建比赛
      </button>
    </div>
    
    <div class="card p-5">
      <h2 class="font-display text-xl text-[var(--accent)] mb-4">历史比赛</h2>
      <div id="tourneyList" class="space-y-2 max-h-[60vh] overflow-y-auto"></div>
    </div>
  </section>

  <!-- 比赛详情页 -->
  <section id="page-detail" class="hidden">
    <div class="mb-3">
      <h2 class="font-display text-2xl text-[var(--accent)]" id="detailTitle">比赛名称</h2>
      <p class="text-xs text-[var(--muted)]" id="detailDate"></p>
    </div>
    
    <div class="tab-bar mb-4">
      <button class="tab active" data-tab="manage" onclick="switchTab('manage')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        选手
      </button>
      <button class="tab" data-tab="bracket" onclick="switchTab('bracket')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        对阵
      </button>
      <button class="tab" data-tab="history" onclick="switchTab('history')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3M3 12a9 9 0 1 0 18 0 9 9 0 1 0-18 0"/></svg>
        记录
      </button>
    </div>

    <div id="tab-manage">
      <div class="card p-4 mb-3">
        <div class="flex gap-2 mb-3">
          <input type="text" id="inputName" class="input" placeholder="输入选手姓名">
          <button onclick="addPlayer()" class="btn btn-primary">添加</button>
        </div>
        <div class="flex gap-2">
          <button onclick="generateBracket()" class="btn btn-primary flex-1" id="btnGen" disabled>生成对阵</button>
          <button onclick="deleteTournament()" class="btn btn-danger btn-sm">删除比赛</button>
        </div>
      </div>
      <div class="card p-4">
        <div class="flex flex-wrap gap-2" id="playerList"></div>
      </div>
    </div>

    <div id="tab-bracket" class="hidden">
      <div class="stat-row mb-3">
        <div class="stat-cell"><p class="text-lg font-bold text-[var(--accent)]" id="statP">0</p><p class="text-[10px] text-[var(--muted)]">选手</p></div>
        <div class="stat-cell"><p class="text-lg font-bold text-[var(--accent)]" id="statM">0</p><p class="text-[10px] text-[var(--muted)]">场次</p></div>
        <div class="stat-cell"><p class="text-lg font-bold text-[var(--accent)]" id="statD">0</p><p class="text-[10px] text-[var(--muted)]">完成</p></div>
      </div>
      <div id="bracketArea" class="overflow-x-auto -mx-4 px-4 pb-4"></div>
    </div>

    <div id="tab-history" class="hidden">
      <div class="card p-4">
        <div id="historyList" class="space-y-2 max-h-[60vh] overflow-y-auto"></div>
      </div>
    </div>
  </section>
</main>

<!-- 比分弹窗 -->
<div id="scoreModal" class="modal-bg">
  <div class="modal-box">
    <h3 class="font-display text-xl text-center text-[var(--accent)] mb-4">登记比分</h3>
    <div id="matchInfo" class="mb-4"></div>
    <div id="scoreArea" class="space-y-3"></div>
    <div class="grid grid-cols-2 gap-2 mt-4">
      <button onclick="forfeit(1)" class="btn btn-danger btn-sm text-xs">选手1弃权</button>
      <button onclick="forfeit(2)" class="btn btn-danger btn-sm text-xs">选手2弃权</button>
    </div>
    <div class="flex gap-2 mt-4">
      <button onclick="closeModal()" class="btn btn-ghost flex-1">取消</button>
      <button onclick="confirmScore()" class="btn btn-primary flex-1">确认</button>
    </div>
  </div>
</div>

<!-- 冠军弹窗 -->
<div id="championModal" class="modal-bg">
  <div class="modal-box text-center">
    <div class="champion-card mb-4">
      <div class="w-16 h-16 mx-auto mb-2 rounded-full bg-gradient-to-br from-yellow-400 to-orange-500 flex items-center justify-center">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="#0a0f0c"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
      </div>
      <p class="text-xs text-[var(--gold)] tracking-widest mb-1">CHAMPION</p>
      <p class="text-2xl font-bold" id="champName"></p>
    </div>
    <button onclick="closeChampion()" class="btn btn-primary w-full">关闭</button>
  </div>
</div>

<script>
// 数据
let tournaments = [];
let currentId = null;
let currentMatch = null;

const $ = id => document.getElementById(id);

// 初始化
function init() {
  load();
  renderList();
  $('newTitle').addEventListener('keypress', e => { if(e.key==='Enter') createTournament(); });
  $('inputName').addEventListener('keypress', e => { if(e.key==='Enter') addPlayer(); });
}

// 创建比赛
function createTournament() {
  const input = $('newTitle');
  const title = input.value.trim() || `比赛 ${tournaments.length + 1}`;
  const t = {
    id: Date.now(),
    title,
    date: Date.now(),
    players: [],
    matches: [],
    history: [],
    champion: null
  };
  tournaments.unshift(t);
  save();
  input.value = '';
  openTournament(t.id);
}

// 打开比赛
function openTournament(id) {
  currentId = id;
  $('page-list').classList.add('hidden');
  $('page-detail').classList.remove('hidden');
  $('backBtn').classList.remove('hidden');
  renderDetail();
}

// 返回列表
function goBack() {
  currentId = null;
  $('page-list').classList.remove('hidden');
  $('page-detail').classList.add('hidden');
  $('backBtn').classList.add('hidden');
  renderList();
}

// 删除比赛
function deleteTournament() {
  if (!confirm('确定删除此比赛？')) return;
  tournaments = tournaments.filter(t => t.id !== currentId);
  save();
  goBack();
}

// 获取当前比赛
function curr() { return tournaments.find(t => t.id === currentId); }

// 添加选手
function addPlayer() {
  const t = curr();
  const input = $('inputName');
  const name = input.value.trim();
  if (!name) return;
  if (t.players.find(p => p.name === name)) { alert('选手已存在'); return; }
  if (t.players.length >= 16) { alert('最多16人'); return; }
  if (t.matches.length) { alert('比赛已开始，无法添加'); return; }
  t.players.push({ id: Date.now(), name });
  input.value = '';
  save();
  renderDetail();
}

// 删除选手
function removePlayer(id) {
  const t = curr();
  if (t.matches.length) return;
  t.players = t.players.filter(p => p.id !== id);
  save();
  renderDetail();
}

// 生成对阵
function generateBracket() {
  const t = curr();
  if (t.players.length < 2) return;
  
  const shuffled = [...t.players].sort(() => Math.random() - 0.5);
  const size = Math.pow(2, Math.ceil(Math.log2(shuffled.length)));
  const rounds = Math.log2(size);
  
  t.matches = [];
  let mid = 0;
  
  // 第一轮
  for (let i = 0; i < size / 2; i++) {
    const p1 = shuffled[i] || null;
    const p2 = shuffled[size - 1 - i - (size - shuffled.length)] || null;
    const m = { id: mid++, round: 0, p1: p1 ? {...p1, score:0} : null, p2: p2 ? {...p2, score:0} : null, winner: null, next: null, forfeit: false };
    if (p1 && !p2) m.winner = m.p1;
    t.matches.push(m);
  }
  
  // 后续轮
  for (let r = 1; r < rounds; r++) {
    const prev = t.matches.filter(m => m.round === r - 1);
    for (let i = 0; i < prev.length; i += 2) {
      const m = { id: mid++, round: r, p1: null, p2: null, winner: null, next: null, forfeit: false };
      prev[i].next = m.id;
      if (prev[i+1]) prev[i+1].next = m.id;
      t.matches.push(m);
    }
  }
  
  // 轮空晋级
  t.matches.filter(m => m.round === 0 && m.winner).forEach(m => advance(t, m));
  t.history = [];
  t.champion = null;
  save();
  renderDetail();
  switchTab('bracket');
}

// 晋级
function advance(t, m) {
  if (!m.winner || m.next === null) return;
  const next = t.matches.find(x => x.id === m.next);
  if (!next) return;
  const w = {...m.winner, score: 0};
  if (!next.p1) next.p1 = w;
  else if (!next.p2) next.p2 = w;
}

// 打开比分弹窗
function openScore(id) {
  const t = curr();
  const m = t.matches.find(x => x.id === id);
  if (!m || !m.p1 || !m.p2 || m.winner) return;
  currentMatch = m;
  
  $('matchInfo').innerHTML = `
    <div class="flex items-center justify-center gap-3 text-sm font-medium">
      <div class="flex items-center gap-1.5">
        <div class="w-7 h-7 rounded-full bg-[var(--accent)]/20 flex items-center justify-center">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <span>${m.p1.name}</span>
      </div>
      <span class="text-[var(--muted)] text-xs">VS</span>
      <div class="flex items-center gap-1.5">
        <span>${m.p2.name}</span>
        <div class="w-7 h-7 rounded-full bg-[var(--accent)]/20 flex items-center justify-center">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
    </div>`;
  
  $('scoreArea').innerHTML = `
    <div class="flex items-center justify-between">
      <span class="text-sm">${m.p1.name}</span>
      <input type="number" id="s1" class="score-input" value="${m.p1.score||0}" min="0" max="21">
    </div>
    <div class="flex items-center justify-between">
      <span class="text-sm">${m.p2.name}</span>
      <input type="number" id="s2" class="score-input" value="${m.p2.score||0}" min="0" max="21">
    </div>
    <p class="text-center text-[10px] text-[var(--muted)]">每局21分制</p>`;
  
  $('scoreModal').classList.add('show');
}

function confirmScore() {
  if (!currentMatch) return;
  const s1 = parseInt($('s1').value) || 0;
  const s2 = parseInt($('s2').value) || 0;
  if (s1 === s2) { alert('比分不能相同'); return; }
  applyResult(s1, s2, false);
}

function forfeit(n) {
  if (!currentMatch) return;
  applyResult(n === 1 ? 0 : 21, n === 1 ? 21 : 0, true);
}

function applyResult(s1, s2, forfeit) {
  const t = curr();
  currentMatch.p1.score = s1;
  currentMatch.p2.score = s2;
  currentMatch.winner = s1 > s2 ? currentMatch.p1 : currentMatch.p2;
  currentMatch.forfeit = forfeit;
  
  t.history.unshift({
    p1: currentMatch.p1.name,
    p2: currentMatch.p2.name,
    s1, s2,
    winner: currentMatch.winner.name,
    round: currentMatch.round,
    forfeit,
    time: Date.now()
  });
  
  advance(t, currentMatch);
  
  const maxR = Math.max(...t.matches.map(m => m.round));
  const final = t.matches.find(m => m.round === maxR);
  if (final && final.winner) {
    t.champion = final.winner.name;
    setTimeout(() => {
      $('champName').textContent = final.winner.name;
      $('championModal').classList.add('show');
      confetti();
    }, 300);
  }
  
  save();
  renderDetail();
  closeModal();
}

function closeModal() { $('scoreModal').classList.remove('show'); currentMatch = null; }
function closeChampion() { $('championModal').classList.remove('show'); }

// Tab切换
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('[id^="tab-"]').forEach(s => s.classList.toggle('hidden', s.id !== `tab-${tab}`));
}

// 渲染比赛列表
function renderList() {
  const list = $('tourneyList');
  if (!tournaments.length) {
    list.innerHTML = '<p class="text-[var(--muted)] text-sm text-center py-8">暂无比赛记录</p>';
    return;
  }
  list.innerHTML = tournaments.map(t => `
    <div class="tourney-item" onclick="openTournament(${t.id})">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-[var(--accent)]/10 flex items-center justify-center">
            ${t.champion ? 
              `<svg width="18" height="18" viewBox="0 0 24 24" fill="var(--gold)"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>` :
              `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>`
            }
          </div>
          <div>
            <p class="font-medium">${t.title}</p>
            <p class="text-[10px] text-[var(--muted)]">${formatDate(t.date)} · ${t.players.length}人</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          ${t.champion ? `<span class="text-[10px] px-2 py-1 rounded bg-[var(--gold)]/10 text-[var(--gold)]">已完成</span>` : 
            t.matches.length ? `<span class="text-[10px] px-2 py-1 rounded bg-[var(--accent)]/10 text-[var(--accent)]">进行中</span>` :
            `<span class="text-[10px] px-2 py-1 rounded bg-white/5 text-[var(--muted)]">未开始</span>`}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>
    </div>
  `).join('');
}

// 渲染详情
function renderDetail() {
  const t = curr();
  if (!t) return;
  
  $('detailTitle').textContent = t.title;
  $('detailDate').textContent = formatDate(t.date);
  $('btnGen').disabled = t.players.length < 2 || t.matches.length > 0;
  
  // 选手
  const pl = $('playerList');
  if (!t.players.length) {
    pl.innerHTML = '<p class="text-[var(--muted)] text-sm w-full text-center py-4">添加选手开始比赛</p>';
  } else {
    pl.innerHTML = t.players.map(p => `
      <div class="tag">
        <div class="w-6 h-6 rounded-full bg-[var(--accent)]/20 flex items-center justify-center">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <span>${p.name}</span>
        <button onclick="event.stopPropagation();removePlayer(${p.id})" class="text-[var(--muted)] hover:text-[var(--red)] ${t.matches.length ? 'opacity-30 pointer-events-none' : ''}">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    `).join('');
  }
  
  // 统计
  const maxR = t.matches.length ? Math.max(...t.matches.map(m => m.round)) : 0;
  $('statP').textContent = t.players.length;
  $('statM').textContent = t.matches.length;
  $('statD').textContent = t.matches.filter(m => m.winner).length;
  
  renderBracket(t, maxR);
  renderHistory(t, maxR);
}

// 渲染对阵
function renderBracket(t, maxR) {
  const area = $('bracketArea');
  if (!t.matches.length) {
    area.innerHTML = '<div class="card p-8 text-center text-[var(--muted)] text-sm">请先生成对阵图</div>';
    return;
  }
  
  const rounds = maxR + 1;
  const names = [];
  for (let i = 0; i < rounds; i++) {
    const r = rounds - i;
    names.push(r === 1 ? '决赛' : r === 2 ? '半决赛' : r === 3 ? '1/4决赛' : `R${i+1}`);
  }
  
  area.innerHTML = `
    <div class="flex gap-2">
      ${Array.from({length: rounds}, (_, ri) => `
        <div class="flex flex-col gap-2 shrink-0">
          <p class="text-[10px] text-[var(--muted)] text-center mb-1 font-medium">${names[ri]}</p>
          ${t.matches.filter(m => m.round === ri).map(m => {
            const play = m.p1 && m.p2 && !m.winner;
            return `
              <div class="match-box ${play ? 'playing' : ''} ${m.winner ? 'done' : ''}" ${play ? `onclick="openScore(${m.id})"` : ''}>
                <div class="flex items-center gap-1 mb-1.5">
                  <span class="dot ${!m.p1||!m.p2 ? 'wait' : m.winner ? 'done' : 'play'}"></span>
                  <span class="text-[9px] text-[var(--muted)]">${!m.p1||!m.p2 ? '等待' : m.winner ? '完成' : '登记'}</span>
                </div>
                ${pRow(m.p1, m.winner)}
                ${pRow(m.p2, m.winner)}
              </div>`;
          }).join('')}
        </div>
      `).join('')}
    </div>
    ${t.champion ? `
      <div class="champion-card mt-3">
        <div class="flex items-center justify-center gap-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--gold)"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
          <div>
            <p class="text-[10px] text-[var(--gold)] tracking-widest">CHAMPION</p>
            <p class="font-bold">${t.champion}</p>
          </div>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--gold)"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        </div>
      </div>` : ''}`;
}

function pRow(p, winner) {
  if (!p) return '<div class="p-row bye">轮空</div>';
  const win = winner?.id === p.id;
  return `<div class="p-row ${win ? 'win' : ''}"><span class="truncate max-w-[70px]">${p.name}</span><span class="score-num ${win ? 'win' : ''}">${p.score||0}</span></div>`;
}

// 渲染历史
function renderHistory(t, maxR) {
  const list = $('historyList');
  if (!t.history.length) {
    list.innerHTML = '<p class="text-[var(--muted)] text-sm text-center py-6">暂无记录</p>';
    return;
  }
  
  const rounds = maxR + 1;
  const rNames = [];
  for (let i = 0; i < rounds; i++) {
    const r = rounds - i;
    rNames[i] = r === 1 ? '决赛' : r === 2 ? '半决赛' : r === 3 ? '1/4决赛' : `第${i+1}轮`;
  }
  
  list.innerHTML = t.history.map(h => `
    <div class="hist-item">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-full bg-[var(--accent)]/10 flex items-center justify-center shrink-0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div>
          <div class="vs-line text-sm">
            <span class="font-medium">${h.p1}</span>
            <span class="text-[var(--accent)] font-bold text-xs">${h.s1}-${h.s2}</span>
            <span class="font-medium">${h.p2}</span>
          </div>
          <div class="flex items-center gap-1.5 mt-0.5">
            <span class="text-[9px] px-1.5 py-0.5 rounded bg-white/5 text-[var(--muted)]">${rNames[h.round]||''}</span>
            ${h.forfeit ? '<span class="text-[9px] px-1.5 py-0.5 rounded bg-[var(--red)]/10 text-[var(--red)]">弃权</span>' : ''}
          </div>
        </div>
      </div>
      <div class="flex items-center gap-1 text-[var(--gold)] shrink-0">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
        <span class="text-xs font-medium">${h.winner}</span>
      </div>
    </div>
  `).join('');
}

// 格式化日期
function formatDate(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

// 存储
function save() { localStorage.setItem('badminton_v3', JSON.stringify(tournaments)); }
function load() {
  try {
    const d = JSON.parse(localStorage.getItem('badminton_v3'));
    if (d) tournaments = d;
  } catch(e) {}
}

// 撒花
function confetti() {
  const colors = ['#00e080','#f0c020','#f05050','#ffffff','#40c0ff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      const c = colors[Math.floor(Math.random() * colors.length)];
      const s = Math.random() * 8 + 5;
      el.style.cssText = `left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${c};border-radius:${Math.random()>0.5?'50%':'2px'};`;
      document.body.appendChild(el);
      const dur = Math.random() * 1500 + 1500;
      el.animate([
        { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
        { transform: `translateY(100vh) translateX(${Math.random()*100-50}px) rotate(${Math.random()*540}deg)`, opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)' });
      setTimeout(() => el.remove(), dur);
    }, i * 25);
  }
}

init();
</script>
